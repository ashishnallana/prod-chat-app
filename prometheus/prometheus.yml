global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "api_gateway"
    static_configs:
      - targets: ["api_gateway:8000"]
        
  - job_name: "auth_service"
    static_configs:
      - targets: ["auth_service:8001"]

  - job_name: "chat_service"
    static_configs:
      - targets: ["chat_service:8002"]

  - job_name: "file_service"
    static_configs:
      - targets: ["file_service:8003"]
