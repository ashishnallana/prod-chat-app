

services:
  # ==========================================
  # INFRASTRUCTURE SERVICES
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: chat_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-chat_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-chat_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6
    container_name: chat_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: chat_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: chat_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ==========================================
  # ANALYTICS SERVICES
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: chat_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: chat_grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning

  # ==========================================
  # BACKEND MICROSERVICES
  # ==========================================
  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    container_name: chat_auth_service
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8001:8001"

  chat_service:
    build:
      context: .
      dockerfile: chat_service/Dockerfile
    container_name: chat_chat_service
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - kafka
      - redis
    ports:
      - "8002:8002"

  file_service:
    build:
      context: .
      dockerfile: file_service/Dockerfile
    container_name: chat_file_service
    env_file: .env
    ports:
      - "8003:8003"

  notification_service:
    build:
      context: .
      dockerfile: notification_service/Dockerfile
    container_name: chat_notification_service
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    depends_on:
      - kafka

  api_gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    container_name: chat_api_gateway
    env_file: .env
    environment:
      # Use docker hostnames instead of localhost inside docker network
      - AUTH_SERVICE_URL=http://auth_service:8001
      - CHAT_SERVICE_URL=http://chat_service:8002
      - FILE_SERVICE_URL=http://file_service:8003
    depends_on:
      - auth_service
      - chat_service
      - file_service
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  mongo_data:
